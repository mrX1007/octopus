# ═══════════════════════════════════════════════
# TOOL SETTINGS
# ═══════════════════════════════════════════════

tools:
  nmap:
    default_flags: ["-sV", "-sC", "-T4", "--open", "-Pn", "-sT"]
    timeout: 300              # v4.0: MUST be 300+ — nmap was dying at 180s
    aggressive_flags: ["-A", "-T4", "-p-", "-Pn", "-sT"]

  hydra:
    threads: 16
    timeout: 600
    flags: ["-V"]          # verbose by default

  ffuf:
    threads: 50
    timeout: 120
    match_codes: "200,204,301,302,307,401,403"
    flags: ["-c"]          # colorized output

  nikto:
    timeout: 300
    flags: ["-nointeractive"]

  sqlmap:
    level: 1
    risk: 1
    timeout: 180
    flags: ["--batch", "--crawl=1"]

  wpscan:
    timeout: 180
    flags: ["--no-update", "--random-user-agent"]

  enum4linux:
    timeout: 150
    flags: ["-a"]

  sslscan:
    timeout: 120
    flags: ["--no-colour"]

  smbclient:
    timeout: 45
    flags: ["-N"]          # null session

  curl:
    timeout: 20
    flags: ["-sI", "--max-time", "10", "--location"]

  dig:
    timeout: 15
    record_types: ["A", "MX", "NS", "TXT", "AAAA", "CNAME"]

  whois:
    timeout: 30

  whatweb:
    timeout: 90
    aggression: 3          # -a 3

  searchsploit:
    timeout: 30
    max_results: 20        # truncate output after N lines

  msfconsole:
    timeout: 300

  gobuster:
    threads: 50
    timeout: 180

  dirb:
    timeout: 180
