# ═══════════════════════════════════════════════
# DATABASE
# ═══════════════════════════════════════════════
db:
  host: "localhost"
  user: "octopus"
  password: "123"
  database: "octopus"

# ═══════════════════════════════════════════════
# OLLAMA / LLM (v7.0)
# ═══════════════════════════════════════════════
ollama:
  url: "http://localhost:11434/api/generate"
  model: "octopus-qwen"
  max_tokens: 4096           # match Modelfile num_predict (12GB VRAM safe)
  json_max_tokens: 1536      # Director/Planner/Extractor JSON should be short
  temperature: 0.4           # v7.0: lowered for deterministic tool selection
  json_temperature: 0.15     # lower variance for strict JSON roles
  top_p: 0.9
  timeout: 1200              # seconds — max wait for one generation
  retries: 3                 # how many times to retry on timeout
  context_window: 6          # 6 exchanges preserved in agent history
  max_tool_loops: 25         # max iterations for full kill chain
  summarize_threshold: 8000  # v7.0: increased for 16K context window
  concurrent_tools: 8        # parallel tool execution workers
  num_gpu: 999               # RTX 4080 Laptop 12GB: offload all 9B layers when possible
  num_threads: 16            # i9 CPU threads for offloaded layers
  num_ctx: 16384             # v7.0: doubled from 8192 for better reasoning
  num_batch: 512             # v7.0: batch size for faster inference
  repeat_penalty: 1.15       # v7.0: reduced from 1.2

# ═══════════════════════════════════════════════
# SCRAPLING
# ═══════════════════════════════════════════════
scrapling:
  enabled: true
  timeout: 30                # per-page fetch timeout
  max_crawl_pages: 10        # max pages for deep crawl
  use_stealth: true          # use StealthyFetcher (anti-bot bypass)

# ═══════════════════════════════════════════════
# SHODAN (v8.0)
# ═══════════════════════════════════════════════
# API key is loaded from .env file (SHODAN_API_KEY), NOT from here!
shodan:
  max_results: 100           # max results per search
  timeout: 30                # API request timeout
  auto_scan: false           # auto-lookup targets on scan start
  save_results: true         # save results to DB + JSON
  results_dir: "/tmp/octopus_shodan"
  auto_pipeline: true        # auto-feed into killchain pipeline

# ═══════════════════════════════════════════════
# HASH CRACKER (v8.0)
# ═══════════════════════════════════════════════
# Optimized for: Intel i9-14900 / RTX 4080 / 64GB RAM
hash_cracker:
  preferred: "hashcat"       # hashcat (GPU) or john (CPU)
  gpu_device: 0              # CUDA device ID
  workload: 3                # hashcat -w (1=low, 2=med, 3=high, 4=insane)
  timeout: 600               # max seconds per cracking phase
  max_wordlist_size: 50000000 # max lines to process from wordlist

# ═══════════════════════════════════════════════
# KILL CHAIN (v7.0 — 9 stages)
# ═══════════════════════════════════════════════
killchain:
  enabled: true
  stages:
    vuln_assess: true        # Stage 1: auto CVE matching via searchsploit/nuclei
    exploitation: true       # Stage 2: auto MSF module matching
    privesc: true            # Stage 3: automated privilege escalation
    persistence: true        # Stage 4: ACTIVE — SSH keys, crontab, SUID shell
    lateral_movement: true   # Stage 5: ACTIVE — auto-try creds on internal hosts
    data_exfil: true         # Stage 6: dump shadow, keys, configs, DB creds
    cleanup: true            # Stage 9 (v7.0): stealth evidence destruction
  exfil_dir: "/tmp"          # base dir for exfiltrated files

# ═══════════════════════════════════════════════
# STRATEGY (v7.0)
# ═══════════════════════════════════════════════
strategy:
  prefer_stealth: true       # use evasion by default
  max_bruteforce_time: 600   # max seconds for bruteforce attempts
  auto_killchain: true       # auto-run kill chain when creds found
  auto_cleanup: true         # auto-run Stage 9 cleanup after assessment
  parallel_tools: 8          # max concurrent tool executions
  max_director_loops: 10     # max Director AI loops

# ═══════════════════════════════════════════════
# REPORTING (v7.0)
# ═══════════════════════════════════════════════
reporting:
  auto_export: false         # auto-generate PDF after scan
  include_raw_output: false  # include raw tool output in report
  cvss_scoring: true         # calculate CVSS base scores

# ═══════════════════════════════════════════════
# BRUTEFORCE ANTI-BLOCK
# ═══════════════════════════════════════════════
bruteforce:
  adaptive_threads: true     # auto-reduce threads on fail2ban detection
  ssh_thread_levels: [4, 2, 1]  # adaptive: drop on rate-limit
  max_retries: 3             # retries per tier on block
  backoff_seconds: [30, 60, 120]  # exponential backoff
  ssh_wait_W: 15             # hydra -W flag (inter-connect wait)
  ssh_wait_w: 15             # hydra -w flag (response wait)
  cooldown_between_tiers: 10 # seconds between tier 1 and tier 1.5

# ═══════════════════════════════════════════════
# PATHS
# ═══════════════════════════════════════════════
paths:
  reports: "~/OCTOPUS/reports"
  logs: "~/OCTOPUS/logs"
  checkpoints: "/tmp"       # checkpoint files dir
  memory: "~/OCTOPUS/memory" # v7.0: ChromaDB vector memory storage

