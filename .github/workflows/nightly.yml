name: nightly-integration

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-integration-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  external-tool-smoke:
    name: External tool and OSINT smoke
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout pinned dependencies
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Install native smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes nmap

      - name: Install locked full Python profile
        run: |
          python scripts/lock_requirements.py validate
          python -m pip install --require-hashes -r requirements/locks/linux-x86_64/cp310/full.txt
          python -m pip check

      - name: Import OSINT and browser boundaries
        run: python -I scripts/quality/import_smoke.py --profile osint-browser

      - name: Run strict native tool smoke
        env:
          OCTOPUS_REQUIRE_EXTERNAL_TOOLS: "1"
        run: python -m pytest -q -m external_tools tests/test_external_tools_smoke.py

      - name: Run deterministic benchmark contracts
        run: python -m pytest -q -m 'benchmark and not slow'
