name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  import-smoke:
    name: Minimal runtime import smoke (Python 3.10)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout pinned dependencies
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Validate dependency locks offline
        run: python scripts/lock_requirements.py validate

      - name: Install locked runtime profile only
        run: |
          python -m pip install --require-hashes -r requirements/locks/linux-x86_64/cp310/runtime.txt
          python -m pip check

      - name: Import public runtime boundaries
        run: python -I scripts/quality/import_smoke.py --profile runtime

  profile-imports:
    name: Optional profile import (${{ matrix.profile }})
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        profile: [c2, reporting, osint-browser, mysql]
    steps:
      - name: Checkout pinned dependencies
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Validate dependency locks offline
        run: python scripts/lock_requirements.py validate

      - name: Install locked optional profile
        run: |
          python -m pip install --require-hashes -r requirements/locks/linux-x86_64/cp310/${{ matrix.profile }}.txt
          python -m pip check

      - name: Import optional profile boundaries
        run: python -I scripts/quality/import_smoke.py --profile '${{ matrix.profile }}'

  static-analysis:
    name: Configured Python quality gates
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - name: Checkout pinned dependencies
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Validate dependency locks offline
        run: python scripts/lock_requirements.py validate

      - name: Install locked test profile
        run: |
          python -m pip install --require-hashes -r requirements/locks/linux-x86_64/cp310/test.txt
          python -m pip check

      - name: Ruff (repository configuration)
        run: python -m ruff check .

      - name: Formatter ratchet on changed Python
        shell: bash
        env:
          EVENT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          change_base="${EVENT_BASE}"
          if [[ ! "${change_base}" =~ ^[0-9a-f]{40}$ ]] || ! git cat-file -e "${change_base}^{commit}"; then
            change_base="$(git rev-parse HEAD^)"
          fi
          python scripts/quality/format_gate.py --root . --base "${change_base}"

      - name: Mypy (repository configuration)
        run: python -m mypy

      - name: Compile first-party Python
        run: >-
          python -m compileall -q
          config.py db.py evasion.py export.py hash_cracker.py memory.py msf.py
          octopus.py search.py shodan_module.py tools.py
          core modules plugins scripts tests

  fast-tests:
    name: Fast hermetic suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            lock-tag: cp310
          - python-version: "3.11"
            lock-tag: cp311
          - python-version: "3.12"
            lock-tag: cp312
    steps:
      - name: Checkout pinned dependencies
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate dependency locks offline
        run: python scripts/lock_requirements.py validate

      - name: Install locked hermetic test profile
        run: |
          python -m pip install --require-hashes -r requirements/locks/linux-x86_64/${{ matrix.lock-tag }}/test.txt
          python -m pip check

      - name: Run fast unit and contract tests
        run: >-
          python -m pytest -q
          -m '(unit or contract) and not slow and not integration and not external_tools and not mysql and not platform'

  full-suite:
    name: Full suite and coverage ratchets (Python 3.10)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout pinned dependencies
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Validate dependency locks offline
        run: python scripts/lock_requirements.py validate

      - name: Install locked hermetic test profile
        run: |
          python -m pip install --require-hashes -r requirements/locks/linux-x86_64/cp310/test.txt
          python -m pip check

      - name: Measure the complete suite with branch coverage
        run: |
          python -m coverage erase
          python -m coverage run --rcfile=quality/coverage-ci.ini -m pytest -q

      - name: Enforce global, package, and changed-line coverage
        shell: bash
        env:
          EVENT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          change_base="${EVENT_BASE}"
          if [[ ! "${change_base}" =~ ^[0-9a-f]{40}$ ]] || ! git cat-file -e "${change_base}^{commit}"; then
            change_base="$(git rev-parse HEAD^)"
          fi
          python scripts/quality/coverage_gate.py \
            --root . \
            --config quality/coverage-ci.ini \
            --fail-under 59.50 \
            --package-fail-under core/actions=70 \
            --package-fail-under core/execution=65 \
            --package-fail-under core/benchmarks=45 \
            --diff-base "${change_base}" \
            --diff-fail-under 80 \
            --xml coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-python310
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

  mysql-integration:
    name: MySQL integration contract
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: octopus_test
          MYSQL_ROOT_PASSWORD: octopus-ci-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - name: Checkout pinned dependencies
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Install locked test and MySQL profiles
        run: |
          python scripts/lock_requirements.py validate
          python -m pip install --require-hashes \
            -r requirements/locks/linux-x86_64/cp310/test.txt \
            -r requirements/locks/linux-x86_64/cp310/mysql.txt
          python -m pip check

      - name: Run live MySQL tests
        env:
          OCTOPUS_TEST_MYSQL: "1"
          OCTOPUS_DB_HOST: 127.0.0.1
          OCTOPUS_DB_NAME: octopus_test
          OCTOPUS_DB_USER: root
          OCTOPUS_DB_PASS: octopus-ci-root
        run: python -m pytest -q -m mysql

  packaging-docs:
    name: Package metadata and documentation contracts
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - name: Checkout pinned dependencies
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Install locked quality toolchain
        run: |
          python scripts/lock_requirements.py validate
          python -m pip install --require-hashes -r requirements/locks/linux-x86_64/cp310/test.txt
          python -m pip check

      - name: Validate docs, schemas, and shipped examples
        run: python scripts/quality/docs_gate.py --root .

      - name: Build wheel and source distribution offline
        run: python -m build --no-isolation

      - name: Install and smoke-test the built wheel
        run: python scripts/quality/wheel_smoke.py dist/*.whl

  dependency-security:
    name: Dependency audit and deterministic SBOM
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - name: Checkout pinned dependencies
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Install locked audit toolchain
        run: |
          python scripts/lock_requirements.py validate
          python -m pip install --require-hashes -r requirements/locks/linux-x86_64/cp310/test.txt
          python -m pip check

      - name: Audit exact full dependency graph
        run: >-
          python -m pip_audit
          --require-hashes --no-deps --disable-pip --strict
          -r requirements/locks/linux-x86_64/cp310/full.txt
          --format json --output dependency-audit.json

      - name: Generate deterministic CycloneDX SBOM
        run: >-
          python scripts/quality/sbom.py
          requirements/locks/linux-x86_64/cp310/full.txt
          --output octopus-sbom.cdx.json

      - name: Upload dependency evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-evidence-python310
          path: |
            dependency-audit.json
            octopus-sbom.cdx.json
          if-no-files-found: warn
          retention-days: 30

  c2-go:
    name: C2 Go build, test, vet, and format
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: core/c2
    steps:
      - name: Checkout pinned dependencies
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Go 1.21
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.21.x"
          cache: false

      - name: Check gofmt
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "${unformatted}" ]]; then
            echo "The following Go files require gofmt:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Download and verify Go modules
        run: |
          go mod download
          go mod verify

      - name: Run Go tests
        run: go test ./...

      - name: Run Go vet
        run: go vet ./...

      - name: Build C2 implant
        run: go build -trimpath -o "${RUNNER_TEMP}/octopus-implant" .

  vendor-integrity:
    name: Pinned submodules and vendor artifact hashes
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout pinned dependencies recursively
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Verify every approved vendor artifact
        run: python -I scripts/quality/verify_vendor.py --platform all

      - name: Verify Linux AMD64 platform selection
        run: python -I scripts/quality/verify_vendor.py --platform linux/amd64
