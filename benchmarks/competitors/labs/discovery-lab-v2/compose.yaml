services:
  discovery-lab-v2:
    build:
      context: .
      dockerfile: Dockerfile
    image: octopus/competitor-discovery-lab:2.0
    init: true
    restart: "no"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      OCTOBENCH_LAB_SCENARIO_ID: "${OCTOBENCH_LAB_SCENARIO_ID:-invalid}"
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.50
    ports:
      - "${OCTOBENCH_LAB_BIND:-127.0.0.1}:${OCTOBENCH_LAB_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8080/__octobench_health', timeout=1).read()
      interval: 15s
      timeout: 15s
      retries: 8
      start_period: 5s
