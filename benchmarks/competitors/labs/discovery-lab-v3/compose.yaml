services:
  discovery-lab-v3:
    build:
      context: ../../../..
      dockerfile: benchmarks/competitors/labs/discovery-lab-v3/Dockerfile
    image: octopus/competitor-discovery-lab:3.0
    init: true
    restart: "no"
    read_only: true
    user: "${OCTOBENCH_V3_UID:-10001}:${OCTOBENCH_V3_GID:-10001}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      OCTOBENCH_V3_HOST: "0.0.0.0"
      OCTOBENCH_V3_LEDGER_PATH: "/controller/request-ledger.jsonl"
      OCTOBENCH_V3_PORT: "8080"
      OCTOBENCH_V3_PRIVATE_MANIFEST: "/controller/private-fixture.json"
    volumes:
      - type: bind
        source: "${OCTOBENCH_V3_RUN_DIRECTORY:-/tmp/octobench-v3-unconfigured}"
        target: /controller
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.50
    ports:
      - "${OCTOBENCH_LAB_BIND:-127.0.0.1}:${OCTOBENCH_LAB_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8080/__octobench_health', timeout=1).read()
      interval: 15s
      timeout: 15s
      retries: 8
      start_period: 5s
    networks:
      - fixture

networks:
  fixture:
    internal: true
