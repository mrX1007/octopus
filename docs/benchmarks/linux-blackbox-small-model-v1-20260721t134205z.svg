  <title id="chart-title">Competitor benchmark terminal outcomes and success-only quality</title>
  <desc id="chart-desc">Terminal outcomes include every scheduled run. Quality statistics include successful runs only, with a separate sample count for each metric. Missing telemetry is not zero. No overall score or winner is declared.</desc>
