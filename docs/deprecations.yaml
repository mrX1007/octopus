schema_version: "1.0"
application_version_at_inventory: "1.1.0"
policy:
  warning_window: "At least one minor release with observable internal usage."
  deletion_rule: >-
    Removal requires zero first-party callers, a documented external-usage audit,
    passing compatibility fixtures, and a behavior-neutral deletion change.

entries:
  - symbol_or_path: "search.py"
    current_owner: "legacy OSINT compatibility surface"
    replacement: "versioned OSINT action providers behind core.actions"
    internal_callers:
      - "tests/test_search.py"
      - "scripts/quality/import_smoke.py"
    public_compatibility_status: "public module; retain until provider migration and external-usage audit"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "memory.py:VectorMemory"
    current_owner: "legacy vector-memory compatibility surface"
    replacement: "FactStore plus evidence/decision-trace projections"
    internal_callers:
      - "tests/test_secret_store.py"
    public_compatibility_status: "public module; no production caller found, external audit required"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "core/knowledge/enricher.py:KnowledgeEnricher"
    current_owner: "legacy text-to-graph adapter"
    replacement: "core.knowledge.projection.GraphProjectionService fed only by FactStore"
    internal_callers:
      - "core/knowledge/__init__.py"
    public_compatibility_status: "re-exported compatibility API; graph writes are not an evidence authority"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "core/recon/recon_engine.py"
    current_owner: "legacy asynchronous reconnaissance runner"
    replacement: "typed read-only discovery actions and provider lifecycle"
    internal_callers:
      - "core/cli/application.py"
      - "tests/benchmark/test_competitor_adapter.py"
      - "tests/test_release_cleanup.py"
    public_compatibility_status: "CLI and benchmark compatibility path; migrate before removal"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "core/observability/"
    current_owner: "legacy audit and in-process metrics package"
    replacement: "core.ai.decision_trace plus core.actions.telemetry"
    internal_callers: []
    public_compatibility_status: "orphaned public package; external-usage audit required"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "core/transport/"
    current_owner: "legacy transport abstraction"
    replacement: "authorized execution adapters with explicit network policy"
    internal_callers:
      - "core/opsec/network.py"
    public_compatibility_status: "public package used only by the legacy network facade"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "core/opsec/network.py"
    current_owner: "legacy network facade"
    replacement: "ExecutionPolicy and typed provider network configuration"
    internal_callers: []
    public_compatibility_status: "orphaned public module; external-usage audit required"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "core/opsec/ja3_client.go"
    current_owner: "legacy Go TLS helper source"
    replacement: "supported provider-owned transport implementation, if retained"
    internal_callers:
      - "core/transport/base.py"
    public_compatibility_status: "source-only compatibility artifact; binary path remains dynamically referenced"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "tools.py"
    current_owner: "top-level tool import facade"
    replacement: "core.tools leaf modules, core.ai.runtime, and core.actions"
    internal_callers:
      - "core/ai/pipeline.py"
      - "octopus.py"
    public_compatibility_status: "public import alias; retain through a measured deprecation window"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "core/tools/runner.py:TOOLS_MENU"
    current_owner: "legacy interactive static menu"
    replacement: "decorator tool registry plus ActionCatalog provider metadata"
    internal_callers:
      - "core/tools/__init__.py"
      - "core/tools/runner.py"
      - "tests/test_execution_gate.py"
    public_compatibility_status: "re-exported mutable mapping; preserve until UI migration"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "octopus.py"
    current_owner: "thin executable and deprecated compatibility facade"
    replacement: "core.cli.main, core.cli.application, core.cli.presentation, and core.cli.history"
    internal_callers:
      - "tests/test_execution_reliability.py"
      - "tests/test_pipeline_reporting_contracts.py"
      - "tests/test_pipeline_quality_misc.py"
      - "tests/test_result_adapter.py"
      - "tests/test_shodan_reliability.py"
    public_compatibility_status: "script entry point remains supported; imported workflow aliases forward during a measured compatibility window"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "core/knowledge/graph.py:KnowledgeGraph"
    current_owner: "KnowledgeGraph compatibility API"
    replacement: "FactStore ingress followed by GraphProjectionService"
    internal_callers:
      - "core/knowledge/__init__.py"
      - "core/knowledge/enricher.py"
      - "core/knowledge/projection.py"
    public_compatibility_status: "retain readers and migration aliases; deprecate evidence-bypassing writes"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "core/ai/evidence.py:RegexParser"
    current_owner: "legacy output parsing fallback"
    replacement: "ParserFamilyPipeline with versioned family contracts"
    internal_callers:
      - "core/ai/evidence.py"
      - "tests/test_parser_family_contracts.py"
    public_compatibility_status: "retain only for unowned legacy outputs until parser-family coverage is complete"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "core/killchain/exploits/base.py:ExploitBase.normalize_check_result"
    current_owner: "legacy exploit check-result compatibility adapter"
    replacement: "ExecutionResult and typed action-provider check outcomes"
    internal_callers:
      - "tests/test_action_provider_contracts.py"
      - "tests/test_execution_results.py"
    public_compatibility_status: "public exploit compatibility behavior; migrate provider by provider"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

  - symbol_or_path: "core/killchain/exploits/base.py:ExploitBase.normalize_run_result"
    current_owner: "legacy exploit run-result compatibility adapter"
    replacement: "ExecutionResult, DispatchResult, and typed action outcomes"
    internal_callers:
      - "tests/test_action_provider_contracts.py"
      - "tests/test_execution_results.py"
    public_compatibility_status: "public exploit compatibility behavior; migrate provider by provider"
    warning_introduced_version: "1.1.0"
    planned_removal_version: "2.0.0"

retained_without_removal_date:
  - symbol_or_path: "benchmarks/competitors/results/linux-blackbox-small-model-v1-20260721t134205z"
    reason: "published immutable benchmark bundle"
  - symbol_or_path: "benchmarks/competitors/results/linux-blackbox-small-model-v2-20260721t202413z"
    reason: "published immutable benchmark bundle"
  - symbol_or_path: "legacy database and schema readers"
    reason: "required for forward migration"
  - symbol_or_path: "core/knowledge graph identity aliases"
    reason: "required for canonical identity migration"
  - symbol_or_path: "vendor gitlinks and artifacts"
    reason: "externally pinned compatibility inputs"
